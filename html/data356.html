    <script>
        $("#show-inactive").on("click", function () {
            let inactiveStudents = document.getElementsByClassName("inactive-student");
            if (this.checked) {
                for (let i = 0; i < inactiveStudents.length; i++) {
                    inactiveStudents[i].classList.remove("hidden");
                }
            }
            else {
                for (let i = 0; i < inactiveStudents.length; i++) {
                    inactiveStudents[i].classList.add("hidden");
                }
            }
        });
    </script>
    

    <script>
        // Track the last clicked submit button so we can identify the submitter
        // in browsers that don't support SubmitEvent.submitter.
        $(document).on('click', '[type=submit]', function () {
            $(this).closest('form').data('lastClickedSubmit', this);
        });

        $(document).on('submit', 'form', function (event) {
            const $form = $(this);

            $form.find('[type=date]').each(function(){
                if (this.min == ""){
                    this.min = "1900-01-01"
                }
            })

            if (!$form[0].reportValidity()) {
                event.preventDefault();
                return;
            }

            // Disabled form elements are excluded from form data (HTML spec), so a named
            // submit button loses its value once disabled. Preserve it in a hidden input
            // before disabling so the server still receives it (e.g. export action flags).
            var submitter = (event.originalEvent && event.originalEvent.submitter)
                            || $form.data('lastClickedSubmit');
            $form.removeData('lastClickedSubmit');
            if (submitter && submitter.name) {
                $('<input>').attr({ type: 'hidden', name: submitter.name, value: submitter.value })
                            .addClass('js-submit-capture')
                            .appendTo($form);
            }

            $form.find('[type=submit]').prop('disabled', true);
            setTimeout(() => {
                $form.find('[type=submit]').prop('disabled', false);
                $form.find('.js-submit-capture').remove();
            }, 10000);
        });
    </script>
