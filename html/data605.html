<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071328">
    <meta name="robots" content="noindex, nofollow">
    <title>Your Website | Under Maintenance</title>

    <style>
        :root {
            --background: #06101f;
            --background-secondary: #0c1f3d;
            --primary: #5b8cff;
            --primary-light: #86b0ff;
            --accent: #35e4c5;
            --text: #f7f9ff;
            --muted: #aab8d4;
            --border: rgba(255, 255, 255, 0.12);
            --card: rgba(10, 27, 53, 0.68);
            --shadow: 0 25px 80px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 12% 20%, rgba(91, 140, 255, 0.24), transparent 28%),
                radial-gradient(circle at 88% 80%, rgba(53, 228, 197, 0.18), transparent 26%),
                linear-gradient(135deg, var(--background), var(--background-secondary));
        }

        a {
            color: inherit;
        }

        .page {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 32px 20px;
            isolation: isolate;
        }

        .grid {
            position: fixed;
            inset: 0;
            z-index: -4;
            opacity: 0.22;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
            background-size: 52px 52px;
            mask-image: linear-gradient(to bottom, black, transparent 95%);
            animation: gridMove 18s linear infinite;
        }

        .orb {
            position: fixed;
            z-index: -3;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            filter: blur(12px);
            opacity: 0.36;
            pointer-events: none;
        }

        .orb-one {
            top: -120px;
            left: -90px;
            background: radial-gradient(circle, var(--primary), transparent 68%);
            animation: floatOne 10s ease-in-out infinite alternate;
        }

        .orb-two {
            right: -100px;
            bottom: -140px;
            background: radial-gradient(circle, var(--accent), transparent 68%);
            animation: floatTwo 12s ease-in-out infinite alternate;
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.62);
            box-shadow: 0 0 15px rgba(91, 140, 255, 0.8);
            animation: rise linear infinite;
        }

        .card {
            position: relative;
            width: min(860px, 100%);
            padding: clamp(30px, 6vw, 66px);
            overflow: hidden;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            animation: cardIn 0.9s cubic-bezier(.2,.8,.2,1) both;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(134, 176, 255, 0.5), transparent 38%, rgba(53, 228, 197, 0.34));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 30px;
            color: #dce7ff;
            font-size: 15px;
            font-weight: 750;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-mark {
            position: relative;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 11px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 10px 28px rgba(91, 140, 255, 0.34);
            animation: pulse 2.5s ease-in-out infinite;
        }

        .brand-mark::before,
        .brand-mark::after {
            content: "";
            position: absolute;
            background: #ffffff;
            border-radius: 20px;
        }

        .brand-mark::before {
            width: 16px;
            height: 4px;
            top: 10px;
            left: 9px;
        }

        .brand-mark::after {
            width: 11px;
            height: 4px;
            top: 19px;
            left: 9px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 22px;
            padding: 9px 14px;
            color: #dce7ff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid rgba(134, 176, 255, 0.25);
            border-radius: 999px;
            background: rgba(91, 140, 255, 0.10);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 0 rgba(53, 228, 197, 0.6);
            animation: statusPulse 1.8s infinite;
        }

        h1 {
            max-width: 760px;
            margin: 0 auto;
            font-size: clamp(38px, 7vw, 76px);
            line-height: 1.02;
            letter-spacing: -0.045em;
        }

        .gradient-text {
            display: block;
            color: transparent;
            background: linear-gradient(90deg, #ffffff, var(--primary-light), var(--accent), #ffffff);
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 5s linear infinite;
        }

        .description {
            max-width: 640px;
            margin: 24px auto 0;
            color: var(--muted);
            font-size: clamp(16px, 2vw, 19px);
            line-height: 1.75;
        }

        .progress-wrap {
            max-width: 610px;
            margin: 36px auto 0;
            padding: 18px 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.035);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 11px;
            color: #dce7ff;
            font-size: 13px;
            font-weight: 700;
        }

        .progress-track {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.09);
        }

        .progress-bar {
            position: relative;
            width: 0;
            height: 100%;
            overflow: hidden;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 22px rgba(53, 228, 197, 0.32);
            animation: fillProgress 1.7s 0.45s cubic-bezier(.2,.8,.2,1) forwards;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
            transform: translateX(-100%);
            animation: progressShine 2.3s 1.8s infinite;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 13px;
            margin-top: 30px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 21px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 750;
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 13px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }

        .button:hover {
            transform: translateY(-3px);
        }

        .button-primary {
            background: linear-gradient(135deg, var(--primary), #6d68ff);
            box-shadow: 0 14px 30px rgba(91, 140, 255, 0.28);
        }

        .button-primary:hover {
            box-shadow: 0 18px 36px rgba(91, 140, 255, 0.38);
        }

        .button-secondary {
            color: #dce7ff;
            border-color: rgba(255, 255, 255, 0.13);
            background: rgba(255, 255, 255, 0.05);
        }

        .button-secondary:hover {
            border-color: rgba(134, 176, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .footer {
            margin-top: 34px;
            color: rgba(190, 204, 230, 0.7);
            font-size: 12px;
            line-height: 1.7;
        }

        .footer strong {
            color: #dce7ff;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fillProgress {
            to { width: 78%; }
        }

        @keyframes progressShine {
            to { transform: translateX(100%); }
        }

        @keyframes textShine {
            to { background-position: 220% center; }
        }

        @keyframes pulse {
            50% {
                transform: translateY(-4px) rotate(3deg);
                box-shadow: 0 18px 38px rgba(53, 228, 197, 0.28);
            }
        }

        @keyframes statusPulse {
            70% {
                box-shadow: 0 0 0 8px rgba(53, 228, 197, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(53, 228, 197, 0);
            }
        }

        @keyframes gridMove {
            to { transform: translateY(52px); }
        }

        @keyframes floatOne {
            to { transform: translate(55px, 45px) scale(1.12); }
        }

        @keyframes floatTwo {
            to { transform: translate(-45px, -35px) scale(1.10); }
        }

        @keyframes rise {
            from {
                transform: translateY(0) scale(0.7);
                opacity: 0;
            }
            12% { opacity: 0.65; }
            85% { opacity: 0.32; }
            to {
                transform: translateY(-115vh) scale(1.25);
                opacity: 0;
            }
        }

        @media (max-width: 620px) {
            .page {
                padding: 18px 14px;
            }

            .card {
                border-radius: 24px;
            }

            .brand {
                margin-bottom: 24px;
            }

            .progress-wrap {
                padding: 16px;
            }

            .actions {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }

            .progress-bar {
                width: 78%;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <div class="grid" aria-hidden="true"></div>
        <div class="orb orb-one" aria-hidden="true"></div>
        <div class="orb orb-two" aria-hidden="true"></div>
        <div class="particles" id="particles" aria-hidden="true"></div>

        <section class="card" aria-labelledby="maintenance-title">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true"></span>
                <span>Your Website</span>
            </div>

            <div class="status">
                <span class="status-dot" aria-hidden="true"></span>
                Site Under Maintenance
            </div>

            <h1 id="maintenance-title">
                <span class="gradient-text">
                    Something Amazing Is On The Way                </span>
            </h1>

            <p class="description">
                We are improving our website to give you a faster, smarter, and better experience.                We appreciate your patience while our team works behind the scenes.
            </p>

            <div class="progress-wrap" aria-label="Maintenance progress">
                <div class="progress-meta">
                    <span>Upgrade Progress</span>
                    <span>78%</span>
                </div>
                <div class="progress-track">
                    <div
                        class="progress-bar"
                        role="progressbar"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-valuenow="78"
                    ></div>
                </div>
            </div>

            <div class="actions">
                <a class="button button-primary" href="/cdn-cgi/l/email-protection#c3aba6afafac83a6bba2aeb3afa6eda0acae">
                    Contact Us
                </a>

                <button class="button button-secondary" type="button" onclick="window.location.reload()">
                    Check Again
                </button>
            </div>

            <p class="footer">
                &copy; 2026 <strong>Your Website</strong>.
                All rights reserved.
            </p>
        </section>
    </main>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        (() => {
            const container = document.getElementById('particles');
            const particleCount = window.innerWidth < 700 ? 18 : 34;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('span');
                particle.className = 'particle';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${8 + Math.random() * 10}s`;
                particle.style.animationDelay = `${Math.random() * -14}s`;
                particle.style.opacity = `${0.15 + Math.random() * 0.5}`;
                particle.style.transform = `scale(${0.6 + Math.random() * 1.2})`;
                container.appendChild(particle);
            }
        })();
    </script>
</body>
</html>
